<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orbit Hopper - OG Image Square Preview</title>
    <link rel="stylesheet" href="fonts.css">
    <script>
      if (location.search.includes('export')) {
        document.write('<style>html,body{margin:0!important;padding:0!important;background:transparent!important;min-height:auto!important;display:block!important;}.og{border-radius:0!important;box-shadow:none!important;}.note{display:none!important;}</style>');
      }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #222;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Space Grotesk', sans-serif;
        }
        .note {
            position: fixed;
            top: 10px; left: 10px;
            color: #9a9ac0;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 6px 10px;
            border-radius: 6px;
            z-index: 10;
        }

        .og {
            width: 1200px;
            height: 1200px;
            position: relative;
            overflow: hidden;
            background: #000018;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .neb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
        }
        .neb-1 {
            width: 800px; height: 800px;
            top: -200px; right: -200px;
            background: radial-gradient(circle, rgba(168,85,247,0.35) 0%, transparent 70%);
        }
        .neb-2 {
            width: 700px; height: 700px;
            bottom: -200px; left: -150px;
            background: radial-gradient(circle, rgba(0,229,255,0.25) 0%, transparent 70%);
        }
        .neb-3 {
            width: 500px; height: 500px;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(168,85,247,0.15) 0%, transparent 70%);
        }

        .stars { position: absolute; inset: 0; }
        .star { position: absolute; background: white; border-radius: 50%; }

        .ring {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }
        .ring-1 {
            width: 900px; height: 900px;
            top: -200px; right: -200px;
            border: 1px solid rgba(168,85,247,0.18);
        }
        .ring-2 {
            width: 700px; height: 700px;
            bottom: -200px; left: -150px;
            border: 1px solid rgba(0,229,255,0.14);
        }

        .planet { position: absolute; pointer-events: none; }
        .planet img { width: 100%; height: 100%; object-fit: contain; }
        .earth {
            width: 320px; height: 320px;
            top: -40px; right: -40px;
            filter: drop-shadow(0 0 45px rgba(0,180,255,0.5));
        }
        .sun {
            width: 260px; height: 260px;
            bottom: -60px; left: -60px;
            filter: drop-shadow(0 0 45px rgba(255,140,0,0.5));
        }

        .rocket {
            position: absolute;
            top: 22%; right: 10%;
            width: 120px; height: auto;
            transform: rotate(30deg);
            filter: drop-shadow(0 0 25px rgba(168,85,247,0.6));
        }

        .content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 80px;
            z-index: 5;
        }

        .logo {
            width: 220px;
            height: 220px;
            border-radius: 48px;
            margin-bottom: 36px;
            box-shadow: 0 16px 48px rgba(168,85,247,0.45), 0 0 0 2px rgba(168,85,247,0.3);
        }

        .brand {
            font-size: 88px;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 28px;
            background: linear-gradient(135deg, #C084FC, #A855F7, #00E5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title {
            font-size: 56px;
            font-weight: 700;
            line-height: 1.1;
            color: #fff;
            margin-bottom: 28px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            letter-spacing: -0.5px;
        }
        .title .accent {
            background: linear-gradient(135deg, #C084FC, #00E5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tag {
            font-size: 32px;
            font-weight: 500;
            color: #d0d0ea;
            letter-spacing: 0.3px;
            line-height: 1.3;
        }
    </style>
</head>
<body>
    <div class="note">Preview at 1200 × 1200 (WhatsApp / iMessage thumbnail spec). Screenshot the purple card below.</div>

    <div class="og" id="og">
        <div class="neb neb-1"></div>
        <div class="neb neb-2"></div>
        <div class="neb neb-3"></div>

        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>

        <div class="stars" id="stars"></div>

        <div class="planet earth"><img src="assets/earth.png" alt=""></div>
        <div class="planet sun"><img src="assets/sun.png" alt=""></div>

        <img class="rocket" src="assets/rockets/rocket_commander.png" alt="">

        <div class="content">
            <img class="logo" src="assets/logo.png" alt="Orbit Hopper">
            <div class="brand">Orbit Hopper</div>
            <div class="title">Master <span class="accent">Gravity.</span><br>Hop the Orbit.</div>
            <p class="tag">Free on iOS and Android</p>
        </div>
    </div>

    <script>
        const stars = document.getElementById('stars');
        const frag = document.createDocumentFragment();
        for (let i = 0; i < 160; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() < 0.2 ? 2.5 : Math.random() < 0.6 ? 1.8 : 1.2;
            s.style.width = size + 'px';
            s.style.height = size + 'px';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.opacity = 0.3 + Math.random() * 0.6;
            if (Math.random() < 0.15) {
                s.style.background = Math.random() < 0.5 ? '#A855F7' : '#00E5FF';
                s.style.boxShadow = `0 0 4px currentColor`;
            }
            frag.appendChild(s);
        }
        stars.appendChild(frag);
    </script>
</body>
</html>
